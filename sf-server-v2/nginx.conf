user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 100M;

    # Upstream definitions
    upstream expert_upstream {
        server host.docker.internal:5173;
    }

    upstream partner_upstream {
        server host.docker.internal:5174;
    }

    upstream admin_upstream {
        server host.docker.internal:5175;
    }

    upstream api_upstream {
        server app:3000;
    }

    upstream api_socket_upstream {
        server app:81;
    }

    server {
        listen 80;
        server_name staging-expert.smoll.me expert.smoll.me 
                    staging-partner.smoll.me partner.smoll.me 
                    staging-api.smoll.me api.smoll.me 
                    staging-admin.smoll.me admin.smoll.me;

        location / {
            if ($host = staging-expert.smoll.me) {
                proxy_pass http://expert_upstream;
            }
            if ($host = expert.smoll.me) {
                proxy_pass http://expert_upstream;
            }
            if ($host = staging-partner.smoll.me) {
                proxy_pass http://partner_upstream;
            }
            if ($host = partner.smoll.me) {
                proxy_pass http://partner_upstream;
            }
            if ($host = staging-admin.smoll.me) {
                proxy_pass http://admin_upstream;
            }
            if ($host = admin.smoll.me) {
                proxy_pass http://admin_upstream;
            }
            if ($host = staging-api.smoll.me) {
                proxy_pass http://api_upstream;
            }
            if ($host = api.smoll.me) {
                proxy_pass http://api_upstream;
            }
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /socket {
            proxy_pass http://api_socket_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}