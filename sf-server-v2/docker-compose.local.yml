# Local dev: Postgres + Redis. Server run locally (yarn start:dev).
# Usage:
#   docker compose -f docker-compose.local.yml up -d
# Then set in .env:
#   DATABASE_URL=postgresql://root:example@localhost:5433/postgres
#   REDIS_HOST=localhost
#   REDIS_PORT=6379

services:
  postgres:
    image: postgres:15-alpine
    container_name: sf-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: example
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: sf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:
