services:
  nginx:
    image: nginx:alpine
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
  app:
    build: .
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    ports:
      - "3000:3000"
      - "81:81"
    env_file:
      - .env
    depends_on:
      - redis
      - nginx
  redis:
    image: "redis:alpine"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data: