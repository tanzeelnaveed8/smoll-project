name: Deploy Admin Portal to DigitalOcean

on:
  push:
    branches:
      - master # or your default branch name
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy to DigitalOcean Droplet
        env:
          HOST: ${{ github.ref == 'refs/heads/master' && secrets.HOST || secrets.STAGING_HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VITE_API_URL: ${{ github.ref == 'refs/heads/master' && vars.VITE_API_URL || vars.VITE_STAGING_API_URL }}
          NODE_ENV: ${{ github.ref == 'refs/heads/master' && 'production' || 'staging' }}
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

          echo "Creating sf-admin directory..."
          ssh -i ~/.ssh/id_rsa $USERNAME@$HOST "mkdir -p ~/app/sf-admin"

           echo "Copying files..."
          scp -i ~/.ssh/id_rsa -r ./* $USERNAME@$HOST:~/app/sf-admin/

          echo "Creating .env file..."
          ssh -i ~/.ssh/id_rsa $USERNAME@$HOST << EOF
            cd ~/app/sf-admin
            echo "VITE_API_URL=$VITE_API_URL" > .env
            echo "VITE_SOCKET_URL=$VITE_SOCKET_URL" >> .env
            echo "VITE_SENTRY_DSN=$VITE_SENTRY_DSN" >> .env
          EOF

          echo "Deploying..."
          ssh -i ~/.ssh/id_rsa $USERNAME@$HOST << EOF
            cd ~/app/sf-admin

            docker-compose stop admin
            docker-compose rm -f admin
            docker-compose build admin
            docker-compose up -d

            echo "Container status after deployment:"
            docker-compose ps
          EOF
