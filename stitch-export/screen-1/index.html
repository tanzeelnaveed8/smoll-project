<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pet Care App - Home</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
<style data-purpose="custom-shadows">
    .card-shadow {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }
    .accent-shadow {
      box-shadow: 0 8px 24px rgba(26, 54, 110, 0.15);
    }
  </style>
</head>
<body class="bg-[#FBFBF9] text-[#1A1C1E] min-h-screen flex flex-col">
<!-- BEGIN: MainHeader -->
<header class="px-6 pt-10 pb-6 flex items-center justify-between" data-purpose="header">
<div class="flex items-center gap-3">
<!-- Profile Picture (Pug) -->
<div class="w-14 h-14 rounded-full bg-[#FFC107] overflow-hidden flex items-center justify-center">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuByDVrGB2izmXiJkVZT4sdDdsVf_z896bDId9BD4Djzy_clMEQsxVQbaHEsKxciuoXlVHy3dcPlM7zW_GQPipq1zntScnJytZTlhpVnsu66B6YxS3voViGr027qKZf2Hi27BogR2gDeaFVskF3HeghVioql3KvR701sfGBuZeVHyAINZIL7rTEQrR1tke6pGtKCA_WeGEmxF0RA6cDEley0cQqGfota-69-PabdFNphwXYmu1hnG5Xrr49BjdvYcEMosu4egw8kWEM"/>
</div>
<!-- Greeting and User Info -->
<div>
<p class="text-[10px] font-bold tracking-widest text-[#9BA1A7] uppercase">Good Morning</p>
<h1 class="text-xl font-bold flex items-center gap-1">
          Sarah &amp; Bella
          <span class="text-[#4E4485] text-lg">🐾</span>
</h1>
</div>
</div>
<!-- Header Icons -->
<div class="flex items-center gap-2">
<button aria-label="Profile" class="w-10 h-10 rounded-full bg-white border border-gray-100 flex items-center justify-center text-gray-400 shadow-sm">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</button>
<button aria-label="Settings" class="w-10 h-10 rounded-full bg-white border border-gray-100 flex items-center justify-center text-gray-400 shadow-sm">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</button>
<button aria-label="Notifications" class="relative w-10 h-10 rounded-full bg-white border border-gray-100 flex items-center justify-center text-gray-400 shadow-sm">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<!-- Notification Dot -->
<span class="absolute top-2.5 right-3 w-1.5 h-1.5 bg-red-500 rounded-full border-2 border-white"></span>
</button>
</div>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: SearchBar -->
<section class="px-6 mb-8" data-purpose="search-container">
<div class="relative w-full">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="w-full bg-white border-none py-4 pl-12 pr-4 rounded-2xl shadow-sm text-sm focus:ring-2 focus:ring-blue-100 placeholder-gray-400" placeholder="Find a specialist, service..." type="text"/>
</div>
</section>
<!-- END: SearchBar -->
<main class="flex-grow">
<!-- BEGIN: ActionCards -->
<section class="px-6 mb-10" data-purpose="services-section">
<h2 class="text-xl font-bold mb-6">What do you need?</h2>
<div class="space-y-4">
<!-- Card 1: Talk to a Vet -->
<div class="bg-white p-6 rounded-[32px] card-shadow flex items-center justify-between cursor-pointer group hover:bg-gray-50 transition-colors">
<div class="flex items-center gap-5">
<div class="w-16 h-16 bg-[#F0F5FF] rounded-2xl flex items-center justify-center text-[#4A86F7]">
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M12 11a2 2 0 100-4 2 2 0 000 4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<div class="flex-1">
<h3 class="text-lg font-bold">Talk to a Vet</h3>
<p class="text-sm text-gray-500 leading-tight mt-1">Instant video consultation with a licensed veterinarian.</p>
</div>
</div>
<button class="w-10 h-10 bg-[#F7F8FA] rounded-full flex items-center justify-center text-gray-300 group-hover:bg-blue-50 group-hover:text-blue-500 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<!-- Card 2: Home Services -->
<div class="bg-white p-6 rounded-[32px] card-shadow flex items-center justify-between cursor-pointer group hover:bg-gray-50 transition-colors">
<div class="flex items-center gap-5">
<div class="w-16 h-16 bg-[#FFF2EA] rounded-2xl flex items-center justify-center text-[#FF8235]">
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<div class="flex-1">
<h3 class="text-lg font-bold">Home Services</h3>
<p class="text-sm text-gray-500 leading-tight mt-1">Grooming, vaccinations, and checkups at your doorstep.</p>
</div>
</div>
<button class="w-10 h-10 bg-[#F7F8FA] rounded-full flex items-center justify-center text-gray-300 group-hover:bg-orange-50 group-hover:text-orange-500 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</div>
</section>
<!-- END: ActionCards -->
<!-- BEGIN: UpcomingSection -->
<section class="px-6 mb-10" data-purpose="upcoming-events">
<div class="flex items-center justify-between mb-4">
<h2 class="text-xl font-bold">Upcoming</h2>
<button class="text-[#4A86F7] text-sm font-semibold">See all</button>
</div>
<!-- Vaccination Card -->
<div class="bg-[#1A3B70] p-6 rounded-[32px] accent-shadow text-white">
<div class="flex items-start gap-4 mb-4">
<div class="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center">
<svg class="w-7 h-7" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<div>
<h3 class="text-lg font-bold">Vaccination Due</h3>
<p class="text-sm text-white/70">Bella needs her annual rabies shot.</p>
</div>
</div>
<button class="w-full bg-white text-[#1A3B70] font-bold py-3.5 rounded-2xl text-sm active:scale-95 transition-transform">
          Schedule Now
        </button>
</div>
</section>
<!-- END: UpcomingSection -->
</main>
<!-- BEGIN: BottomNavigation -->
<nav class="bg-white border-t border-gray-100 pb-8 pt-4 px-6 rounded-t-[40px] shadow-2xl" data-purpose="bottom-nav">
<div class="flex justify-between items-center">
<!-- Home Icon -->
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="w-12 h-12 bg-[#F0F5FF] rounded-2xl flex items-center justify-center text-[#4A86F7]">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-[10px] font-bold text-[#4A86F7]">Home</span>
</a>
<!-- Inbox Icon -->
<a class="flex flex-col items-center gap-1 text-gray-400" href="#">
<div class="w-12 h-12 flex items-center justify-center">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<span class="text-[10px] font-bold">Inbox</span>
</a>
<!-- Chat Icon -->
<a class="flex flex-col items-center gap-1 text-gray-400" href="#">
<div class="w-12 h-12 flex items-center justify-center">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<span class="text-[10px] font-bold">Chat</span>
</a>
<!-- Profile Icon -->
<a class="flex flex-col items-center gap-1 text-gray-400" href="#">
<div class="w-12 h-12 flex items-center justify-center">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<span class="text-[10px] font-bold">Profile</span>
</a>
</div>
</nav>
<!-- END: BottomNavigation -->
</body></html>
